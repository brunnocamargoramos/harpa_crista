name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restaurar keystore debug compartilhada
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          if [ -n "$DEBUG_KEYSTORE" ]; then
            mkdir -p ~/.android
            echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore
            echo "Keystore compartilhada restaurada em ~/.android/debug.keystore"
          else
            echo "Secret DEBUG_KEYSTORE nao configurado - cada build usara keystore propria (incompativel entre builds)"
          fi

      - name: Grant execute on gradlew
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk harpa-crista.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: harpa-crista-apk
          path: harpa-crista.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Versão mais recente (master)
          prerelease: true
          files: harpa-crista.apk
          body: |
            APK gerado automaticamente do último build em `master`.

            **Como instalar:**
            1. Baixe o arquivo `harpa-crista.apk` abaixo
            2. No celular Android, libere "Instalar de fontes desconhecidas" pro seu navegador/gerenciador de arquivos
            3. Abra o `.apk` baixado e toque em **Instalar**

            > Esta release é substituída a cada novo push em `master`.
