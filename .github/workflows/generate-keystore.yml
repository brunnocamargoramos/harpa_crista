name: Gerar keystore debug compartilhada

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gerar keystore
        run: |
          keytool -genkeypair -v \
            -keystore harpa-debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10950 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Codificar em base64
        run: |
          echo "============ COPIE TUDO ABAIXO ============"
          base64 -w 0 harpa-debug.keystore
          echo ""
          echo "============ FIM ============"

      - name: Upload keystore como artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: harpa-debug.keystore
          retention-days: 1
